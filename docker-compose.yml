services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orryx_editor}
      POSTGRES_USER: ${POSTGRES_USER:-orryx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    image: ${ORRYX_IMAGE:-orryx-editor:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-9090}:9090"
    environment:
      PORT: "9090"
      ADMIN_KEY: ${ADMIN_KEY:?ADMIN_KEY is required}
      DATABASE_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB:-orryx_editor}
      DATABASE_USER: ${POSTGRES_USER:-orryx}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DATA_DIR: /app/data
      DEPLOYMENT_MODE: container
      UPDATE_ENABLED: ${UPDATE_ENABLED:-false}
      UPDATE_GITHUB_REPOSITORY: ${UPDATE_GITHUB_REPOSITORY:-zhibeigg/orryx-edit}
      UPDATE_GITHUB_TOKEN: ${UPDATE_GITHUB_TOKEN:-}
      KETHER_DOCS_SYNC_ENABLED: ${KETHER_DOCS_SYNC_ENABLED:-true}
      KETHER_DOCS_SYNC_INTERVAL_HOURS: ${KETHER_DOCS_SYNC_INTERVAL_HOURS:-12}
      KETHER_DOCS_REQUEST_TIMEOUT_SECONDS: ${KETHER_DOCS_REQUEST_TIMEOUT_SECONDS:-20}
      KETHER_DOCS_MAX_SCHEMA_BYTES: ${KETHER_DOCS_MAX_SCHEMA_BYTES:-4194304}
      CORS_HOSTS: ${CORS_HOSTS:-}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      HSTS_ENABLED: ${HSTS_ENABLED:-false}
      ACCOUNTS_ENABLED: ${ACCOUNTS_ENABLED:-false}
      CLOUD_DRAFTS_ENABLED: ${CLOUD_DRAFTS_ENABLED:-false}
      ACCOUNT_SESSION_TTL_HOURS: ${ACCOUNT_SESSION_TTL_HOURS:-168}
      ACCOUNT_COOKIE_SECURE: ${ACCOUNT_COOKIE_SECURE:-true}
      ACCOUNT_COOKIE_DOMAIN: ${ACCOUNT_COOKIE_DOMAIN:-}
      EDITOR_PROTOCOL_V2_ENABLED: ${EDITOR_PROTOCOL_V2_ENABLED:-false}
      EDITOR_V2_WRITES_ENABLED: ${EDITOR_V2_WRITES_ENABLED:-false}
      RELEASE_TRANSACTIONS_ENABLED: ${RELEASE_TRANSACTIONS_ENABLED:-false}
      RELEASE_PUBLIC_BASE_URL: ${RELEASE_PUBLIC_BASE_URL:-}
      RELEASE_ALLOW_LOCAL_HTTP: ${RELEASE_ALLOW_LOCAL_HTTP:-false}
      RELEASE_SIGNING_PRIVATE_KEY_PKCS8_BASE64: ${RELEASE_SIGNING_PRIVATE_KEY_PKCS8_BASE64:-}
      RELEASE_SIGNING_PUBLIC_KEY_X509_BASE64: ${RELEASE_SIGNING_PUBLIC_KEY_X509_BASE64:-}
      RELEASE_TRANSFER_TTL_SECONDS: ${RELEASE_TRANSFER_TTL_SECONDS:-300}
      RELEASE_TRANSACTION_LEASE_SECONDS: ${RELEASE_TRANSACTION_LEASE_SECONDS:-30}
      RELEASE_READINESS_TIMEOUT_SECONDS: ${RELEASE_READINESS_TIMEOUT_SECONDS:-180}
      RELEASE_MAX_BYTES: ${RELEASE_MAX_BYTES:-67108864}
      AI_WORKBENCH_ENABLED: ${AI_WORKBENCH_ENABLED:-false}
      AI_PROVIDER_ID: ${AI_PROVIDER_ID:-default}
      AI_PROVIDER_BASE_URL: ${AI_PROVIDER_BASE_URL:-https://api.openai.com/v1}
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL:-}
      AI_PROVIDER_REQUEST_TIMEOUT_SECONDS: ${AI_PROVIDER_REQUEST_TIMEOUT_SECONDS:-60}
      AI_PROVIDER_MAX_RESPONSE_BYTES: ${AI_PROVIDER_MAX_RESPONSE_BYTES:-2097152}
      AI_INPUT_COST_PER_MILLION_CENTS: ${AI_INPUT_COST_PER_MILLION_CENTS:-0}
      AI_OUTPUT_COST_PER_MILLION_CENTS: ${AI_OUTPUT_COST_PER_MILLION_CENTS:-0}
      AI_USAGE_RESERVATION_CENTS: ${AI_USAGE_RESERVATION_CENTS:-100}
      RUNNER_ENABLED: ${RUNNER_ENABLED:-false}
      RUNNER_ENDPOINT: ${RUNNER_ENDPOINT:-http://127.0.0.1:9781/v1/run}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-}
      RUNNER_REQUEST_TIMEOUT_SECONDS: ${RUNNER_REQUEST_TIMEOUT_SECONDS:-60}
      RUNNER_MAX_RESPONSE_BYTES: ${RUNNER_MAX_RESPONSE_BYTES:-4194304}
    volumes:
      - app-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9090/health/ready"]
      interval: 15s
      timeout: 3s
      start_period: 30s
      retries: 4

volumes:
  postgres-data:
  app-data:
